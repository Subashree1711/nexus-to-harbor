apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-to-edge.fullname" . }}
  labels:
    {{- include "nexus-to-edge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      protocol: TCP
  selector:
    {{- include "nexus-to-edge.selectorLabels" . | nindent 4 }}
